apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bolao-ingress
spec:
  rules:
  - host: {{ .Values.global.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.global.frontend.name }}-service
            port:
              number: {{ .Values.global.frontend.port }}
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.global.backend.name }}-service
            port:
              number: {{ .Values.global.backend.port }}